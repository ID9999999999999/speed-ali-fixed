name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android platform
        run: flutter create --platforms=android --project-name speed_ali_ouici .

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-debug.apk Speed.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: speed-debug-apk
          path: Speed.apk
          if-no-files-found: error

      - name: Delete old debug release if exists
        run: |
          gh release delete speed-debug --yes || true
          git push origin :refs/tags/speed-debug || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create visible release with APK
        run: |
          gh release create speed-debug Speed.apk \
            --title "Speed Debug APK" \
            --notes "Automatic debug APK build for Speed."
        env:
          GH_TOKEN: ${{ github.token }}
